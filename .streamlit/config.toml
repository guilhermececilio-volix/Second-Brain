# Tema base do app, na identidade da Volix (paleta SDG).
# Fixar aqui faz o Streamlit nascer escuro — o CSS em src/theme.py só refina.
[theme]
base = "dark"
primaryColor = "#43C49E"
backgroundColor = "#0A0A0B"
secondaryBackgroundColor = "#141416"
textColor = "#D4D4D8"
font = "sans serif"

[client]
toolbarMode = "minimal"
